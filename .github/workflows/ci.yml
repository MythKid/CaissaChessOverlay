name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint & test (engine-free)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # Only the deps the engine-free test suite needs. opencv-python-headless
        # avoids pulling GUI/GL libraries on the CI runner.
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy "opencv-python-headless>=4.8" "chess>=1.11" pytest

      - name: Byte-compile all source
        run: python -m compileall -q src run.py build.py

      - name: Run tests
        run: python -m pytest tests/ -q
